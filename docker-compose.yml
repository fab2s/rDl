services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.cpu
    image: rdl-dev
    volumes:
      - .:/workspace
      # Cache Rust build artifacts and registry between runs
      - cargo-registry:/root/.cargo/registry
      - cargo-git:/root/.cargo/git
      - target-cache:/workspace/target
    working_dir: /workspace
    stdin_open: true
    tty: true

volumes:
  cargo-registry:
  cargo-git:
  target-cache:
